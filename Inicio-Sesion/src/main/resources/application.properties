# ─────────────────────────────────────────────────────────────
#  Inicio-Sesion - autenticacion de clientes (JWT)
# ─────────────────────────────────────────────────────────────
spring.application.name=inicio-sesion
server.port=8086

# Base de datos PROPIA de este microservicio
spring.datasource.url=jdbc:mysql://localhost:3306/ecomarket_iniciosesion?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT: secreto de firma (HMAC) y vigencia del token (24 horas)
jwt.secret=7b9b1d2e4f6a8c0e2d4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b0c2e4f6a8b
jwt.expiration-ms=86400000
